; PlatformIO project for the GameBoy HiFi Audio firmware.
; Framework: ESP-IDF (not Arduino).
;
; Target module: ESP32-PICO-MINI-02-N8R2 (8 MB flash). "esp32dev" is the generic
; ESP32 board; the flash size, partition table, and pin map are set explicitly in
; sdkconfig.defaults, partitions.csv, and src/pinmap.h.

[env:prod]
platform = espressif32
framework = espidf
board = esp32dev
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; sdkconfig.defaults at the project root is picked up automatically.
