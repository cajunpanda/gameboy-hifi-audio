# Deploy the BLE Web-Bluetooth config UI (web/) to GitHub Pages.
#
# The page is a single static file (web/index.html) that talks to the firmware's
# BLE GATT config server (src/ble_config.c) over Web Bluetooth, no build step and
# no backend. Web Bluetooth requires a secure context, which GitHub Pages' HTTPS
# provides. Served at https://<user>.github.io/<repo>/.
#
# One-time setup: repo Settings, Pages, Build and deployment, Source =
# "GitHub Actions".
name: Deploy web UI to Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
